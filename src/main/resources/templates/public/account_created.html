<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.toLanguageTag()}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="|${#messages.msg('page.account_created.heading')} - ${#messages.msg('app.name')}|">
    Account created - Invites for your Keycloak 💌 🗝
  </title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body
  class="flex min-h-screen items-center justify-center bg-gradient-to-br from-emerald-50 via-white to-sky-50 text-slate-900 antialiased"
>
<main
  class="mx-4 w-full max-w-xl rounded-2xl border border-emerald-200/80 bg-white/90 p-6 text-center shadow-2xl shadow-emerald-100 backdrop-blur sm:p-8 sm:text-left"
>
  <h1 class="text-2xl font-semibold text-emerald-800" th:text="#{page.account_created.heading}">Account created</h1>
  <p class="mt-2 text-base leading-relaxed text-slate-700" th:text="#{page.account_created.body}">
    Your account has been created successfully.
  </p>
  <p class="mt-3 text-sm leading-relaxed text-slate-600" th:text="#{page.account_created.hint}">
    If you do not receive an email, check your spam folder or contact your administrator.
  </p>
</main>
</body>
</html>
