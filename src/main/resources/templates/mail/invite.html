<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.toLanguageTag()}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{mail.invite.subject(${target ?: 'example'})}">Invitation to example</title>
</head>
<body>
<h1 th:text="#{mail.invite.heading}">You're invited!</h1>
<p>
  <span th:text="#{mail.invite.intro}">You have been invited to</span>
  <strong th:text="${target ?: 'example'}">example</strong>.
</p>
<p th:text="#{mail.invite.cta}">Click the link below to accept your invitation:</p>
<p>
  <a th:attr="href=${link ?: 'https://example.org/invite/realm/token'}"
     th:text="${link ?: 'https://example.org/invite/realm/token'}">
    https://example.org/invite/realm/token
  </a>
</p>
<p th:text="#{mail.invite.expiry_prefix}">The invite expires at</p>
<p>
  <time th:data-local-datetime="${expiresAt}"
        th:title="${#temporals.format(expiresAt, 'yyyy-MM-dd HH:mm:ss z')}"
        th:text="${#temporals.format(expiresAt, 'yyyy-MM-dd HH:mm:ss z')}">
    2025-01-01 12:00:00 UTC
  </time>
</p>
<p th:text="#{mail.invite.ignore}">If you did not expect this email, you can safely ignore it.</p>

<script th:inline="javascript">
  const pageLocale = /*[[${#locale.toLanguageTag()}]]*/ 'en';
  const dateTimeFormatter = new Intl.DateTimeFormat(pageLocale, {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    timeZoneName: 'short'
  });

  document.querySelectorAll('[data-local-datetime]').forEach((element) => {
    const value = element.getAttribute('data-local-datetime');
    const date = value ? new Date(value) : null;
    if (!date || Number.isNaN(date.getTime())) {
      return;
    }
    element.textContent = dateTimeFormatter.format(date);
  });
</script>
</body>
</html>
